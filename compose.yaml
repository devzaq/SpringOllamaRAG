services:
  pgvector:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_DB=market'
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_USER=master'
    labels:
      - "org.springframework.boot.service-connection=postgres"
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master -d market"]
      interval: 5s
      timeout: 5s
      retries: 10